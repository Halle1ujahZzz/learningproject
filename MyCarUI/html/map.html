<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度地图车机版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        html, body, #mapContainer {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121212;
        }
    </style>
    <!-- 百度地图API  -->
    <script type="text/javascript" 
            src="https://api.map.baidu.com/api?v=3.0&ak=FBfr6TTZQgDpyWTjlf2ocGWrfbakcTu5"></script>
</head>
<body>
    <div id="mapContainer"></div>
    
    <script>
        // 全局地图对象
        var map = null;
        var marker = null;
        var driving = null;
        
        // 页面加载完成后初始化地图
        document.addEventListener('DOMContentLoaded', function() {
            try {
                // 创建地图实例
                map = new BMap.Map("mapContainer");
                
                // 设置默认中心点（北京天安门）
                var point = new BMap.Point(116.404, 39.915);
                map.centerAndZoom(point, 15);
                
                // 启用滚轮缩放
                map.enableScrollWheelZoom(true);
                
                // 添加控件
                map.addControl(new BMap.NavigationControl());
                map.addControl(new BMap.ScaleControl());
                map.addControl(new BMap.OverviewMapControl());
                
                // 添加当前位置标记
                marker = new BMap.Marker(point);
                map.addOverlay(marker);
                
                // 添加信息窗口
                var infoWindow = new BMap.InfoWindow("当前位置", {
                    width: 200,
                    height: 50
                });
                marker.addEventListener("click", function() {
                    this.openInfoWindow(infoWindow);
                });
                
                console.log("百度地图初始化成功");
                
                // 通知QML地图已加载完成
                if (window.qt && window.qt.mapLoaded) {
                    window.qt.mapLoaded();
                }
                
            } catch (error) {
                console.error("地图初始化失败:", error);
            }
        });
        
        // 搜索地点
        function searchPlace(keyword) {
            if (!map) return;
            
            // 清除之前的搜索结果
            map.clearOverlays();
            
            // 本地搜索
            var local = new BMap.LocalSearch(map, {
                renderOptions: {map: map, autoViewport: true}
            });
            local.search(keyword);
            
            // 添加一个标记
            var point = map.getCenter();
            var newMarker = new BMap.Marker(point);
            map.addOverlay(newMarker);
            
            var infoWindow = new BMap.InfoWindow("搜索结果: " + keyword, {
                width: 250,
                height: 60
            });
            newMarker.openInfoWindow(infoWindow);
        }
        
        // 路线规划
        function planRoute(startLng, startLat, endLng, endLat) {
            if (!map) return;
            
            // 清除之前的路线
            if (driving) {
                map.clearOverlays();
            }
            
            var startPoint = new BMap.Point(startLng, startLat);
            var endPoint = new BMap.Point(endLng, endLat);
            
            // 添加起点和终点标记
            var startMarker = new BMap.Marker(startPoint);
            var endMarker = new BMap.Marker(endPoint);
            map.addOverlay(startMarker);
            map.addOverlay(endMarker);
            
            // 驾车路线规划
            driving = new BMap.DrivingRoute(map, {
                renderOptions: {
                    map: map,
                    autoViewport: true,
                    enableDragging: true
                },
                onSearchComplete: function(results) {
                    if (driving.getStatus() == BMAP_STATUS_SUCCESS) {
                        var plan = results.getPlan(0);
                        var distance = (plan.getDistance() / 1000).toFixed(1) + "公里";
                        var duration = Math.round(plan.getDuration() / 60) + "分钟";
                        
                        // 显示导航信息
                        if (window.qt && window.qt.showNavigationInfo) {
                            window.qt.showNavigationInfo(distance, duration);
                        }
                    }
                }
            });
            
            driving.search(startPoint, endPoint);
        }
        
        // 定位到指定位置
        function locateToPosition(lng, lat) {
            if (!map) return;
            
            var point = new BMap.Point(lng, lat);
            map.centerAndZoom(point, 15);
            
            if (marker) {
                marker.setPosition(point);
            }
        }
        
        console.log("HTML页面加载完成");
    </script>
</body>
</html>
